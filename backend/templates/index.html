<!--
  Vue 빌드 결과가 없을 때를 위한 대체 페이지.
  실제 운영에서는 frontend/dist/index.html 이 우선 사용됩니다.
  (settings.py 의 TEMPLATES.DIRS 에 frontend/dist 가 먼저 등록되어 있음)
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>덕꾸 (Deokkku)</title>
  <style>
    body { font-family: 'Pretendard', sans-serif; background: linear-gradient(135deg, #f5f0ff 0%, #fff0f5 100%);
           display:flex; align-items:center; justify-content:center; height:100vh; margin:0; color:#5a4a8a; }
    .card { background:#fff; padding:48px; border-radius:24px; box-shadow:0 8px 40px rgba(120,90,200,.15);
            max-width:520px; text-align:center; }
    h1 { color:#7c3aed; margin:0 0 12px; }
    code { background:#f3eafe; padding:2px 8px; border-radius:6px; color:#7c3aed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌸 덕꾸 (Deokkku)</h1>
    <p>Vue 빌드 결과물이 아직 없습니다.</p>
    <p>프론트엔드 폴더에서 <code>npm install && npm run build</code> 를 실행해주세요.</p>
    <p>또는 개발 모드: <code>npm run dev</code> 후 <a href="http://localhost:5173">localhost:5173</a> 접속.</p>
  </div>
</body>
</html>
